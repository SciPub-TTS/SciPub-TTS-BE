name: CI - Build Check

on:
  push:
    branches: ["dev", "main"]
  pull_request:
    branches: ["dev", "main"]

env:
  SPRING_PROFILES_ACTIVE: dev

  DEV_DB_URL: ${{ secrets.DEV_DB_URL }}
  DEV_DB_USERNAME: ${{ secrets.DEV_DB_USERNAME }}
  DEV_DB_PASSWORD: ${{ secrets.DEV_DB_PASSWORD }}

  DEV_MAIL_USERNAME: ${{ secrets.DEV_MAIL_USERNAME }}
  DEV_MAIL_PASSWORD: ${{ secrets.DEV_MAIL_PASSWORD }}

  DEV_GOOGLE_CLIENT_ID: ${{ secrets.DEV_GOOGLE_CLIENT_ID }}
  DEV_GOOGLE_CLIENT_SECRET: ${{ secrets.DEV_GOOGLE_CLIENT_SECRET }}

  DEV_JWT_SECRET: ${{ secrets.DEV_JWT_SECRET }}

  DEV_CORS_ALLOWED_ORIGINS: ${{ secrets.DEV_CORS_ALLOWED_ORIGINS }}

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: scipubtts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: "maven"

      - name: Build with Maven (no tests)
        run: mvn clean package -DskipTests

      # =========================
      # DISCORD NOTIFICATION
      # ========================

      - name: Discord notification (success)
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_CI_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"embeds\": [{
              \"title\": \"✅ CI Passed\",
              \"color\": 5763719,
              \"fields\": [
                {
                  \"name\": \"Repository\",
                  \"value\": \"${{ github.repository }}\",
                  \"inline\": true
                },
                {
                  \"name\": \"Branch\",
                  \"value\": \"${{ github.ref_name }}\",
                  \"inline\": true
                },
                {
                  \"name\": \"Commit\",
                  \"value\": \"${{ github.sha }}\"
                }
              ]
            }]
          }" \
          $DISCORD_WEBHOOK

      - name: Discord notification (failure)
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_CI_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"embeds\": [{
              \"title\": \"❌ CI Failed\",
              \"color\": 15548997,
              \"fields\": [
                {
                  \"name\": \"Repository\",
                  \"value\": \"${{ github.repository }}\",
                  \"inline\": true
                },
                {
                  \"name\": \"Branch\",
                  \"value\": \"${{ github.ref_name }}\",
                  \"inline\": true
                },
                {
                  \"name\": \"Commit\",
                  \"value\": \"${{ github.sha }}\"
                }
              ]
            }]
          }" \
          $DISCORD_WEBHOOK

server.port=${PORT:80}

spring.datasource.url=${PROD_DB_URL}
spring.datasource.username=${PROD_DB_USERNAME}
spring.datasource.password=${PROD_DB_PASSWORD}

spring.mail.username=${PROD_MAIL_USERNAME}
spring.mail.password=${PROD_MAIL_PASSWORD}

spring.security.oauth2.client.registration.google.client-id=${PROD_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${PROD_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

app.jwt.secret=${PROD_JWT_SECRET}
server.servlet.session.cookie.name=SCIPUB_SESSION_PROD
app.cors.allowed-origins=${PROD_CORS_ALLOWED_ORIGINS}